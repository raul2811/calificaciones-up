services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8081}"
        NEXT_PUBLIC_APP_NAME: "${NEXT_PUBLIC_APP_NAME:-Calificaciones UP}"
        NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}"
    depends_on:
      - api
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8081}"
      NEXT_PUBLIC_APP_NAME: "${NEXT_PUBLIC_APP_NAME:-Calificaciones UP}"
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}"
    ports:
      - "${WEB_PORT:-3000}:3000"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      PORT: 8081
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:-http://localhost:3000}"
      RUST_LOG: "${RUST_LOG:-api=info,tower_http=info}"
      MATRICULA_BASE_URL: "${MATRICULA_BASE_URL:-https://matricula.up.ac.pa}"
      MATRICULA_USER_AGENT: "${MATRICULA_USER_AGENT:-Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36}"
    ports:
      - "${API_PORT:-8081}:8081"
