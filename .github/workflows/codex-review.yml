name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: >
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      vars.CODEX_REVIEW_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch PR base branch
        run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"

      - name: Run Codex review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: drop-sudo
          prompt: |
            Review PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.

            Review ONLY the diff introduced by this PR.
            Base branch: ${{ github.event.pull_request.base.ref }}
            Base SHA: ${{ github.event.pull_request.base.sha }}
            Head SHA: ${{ github.event.pull_request.head.sha }}

            Priorities:
            1. security and secret handling
            2. logic and correctness
            3. Rust backend quality and error handling
            4. CI/CD, Docker and workflow regressions
            5. maintainability

            Rules:
            - Do not comment on style unless it affects correctness or maintenance.
            - Call out hardcoded secrets, unsafe logging, risky workflow permissions, broken contracts and CI breakage.
            - Be concise and actionable.

            Return markdown with:
            - Findings
            - Risk level
            - Suggested next steps

      - name: Post Codex review comment
        if: steps.codex.outputs.final_message != ''
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
