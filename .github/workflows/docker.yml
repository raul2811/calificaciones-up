name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "package.json"
      - "package-lock.json"
      - ".dockerignore"
      - "apps/api/.dockerignore"
      - "compose.yaml"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "package.json"
      - "package-lock.json"
      - ".dockerignore"
      - "apps/api/.dockerignore"
      - "compose.yaml"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: api
            image: calificaciones-up-api
            context: ./apps/api
            file: ./apps/api/Dockerfile
            port: 8081:8081
            health_url: http://127.0.0.1:8081/health
            build_args: ""
          - id: web
            image: calificaciones-up-web
            context: .
            file: ./apps/web/Dockerfile
            port: 3000:3000
            health_url: http://127.0.0.1:3000/
            build_args: |
              NEXT_PUBLIC_API_BASE_URL=http://localhost:8081
              NEXT_PUBLIC_SITE_URL=http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          build-args: ${{ matrix.build_args }}
          tags: local/${{ matrix.image }}:ci
          load: true
          push: false
          cache-from: type=gha,scope=${{ matrix.id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.id }}

      - name: Smoke test container
        shell: bash
        run: |
          docker run -d --rm --name "${{ matrix.id }}" -p "${{ matrix.port }}" "local/${{ matrix.image }}:ci"
          for attempt in {1..30}; do
            if curl -fsS "${{ matrix.health_url }}" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs "${{ matrix.id }}"
          exit 1

      - name: Cleanup container
        if: always()
        run: docker rm -f "${{ matrix.id }}" || true

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: api
            image: calificaciones-up-api
            context: ./apps/api
            file: ./apps/api/Dockerfile
            build_args: ""
          - id: web
            image: calificaciones-up-web
            context: .
            file: ./apps/web/Dockerfile
            build_args: |
              NEXT_PUBLIC_API_BASE_URL=http://localhost:8081
              NEXT_PUBLIC_SITE_URL=http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          build-args: ${{ matrix.build_args }}
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=publish-${{ matrix.id }}
          cache-to: type=gha,mode=max,scope=publish-${{ matrix.id }}

      - name: Attest published image provenance
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
