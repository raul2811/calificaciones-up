name: Codex Autofix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  autofix:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      !startsWith(github.event.workflow_run.head_branch, 'codex/') &&
      !endsWith(github.event.workflow_run.actor.login, '[bot]') &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'pull_request') &&
      vars.CODEX_AUTOFIX_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write

    steps:
      - name: Checkout failing revision
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/api -> target
          shared-key: api-codex-autofix

      - name: Prefetch Rust dependencies
        run: cargo fetch --manifest-path apps/api/Cargo.toml

      - name: Collect CI failure context
        id: context
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const run = context.payload.workflow_run;
            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
              per_page: 100,
            });

            const failedJobs = jobs
              .filter((job) => job.conclusion === 'failure')
              .map((job) => {
                const failedSteps = (job.steps || [])
                  .filter((step) => step.conclusion === 'failure')
                  .map((step) => `  - ${step.name}`)
                  .join('\n');
                return `- ${job.name}\n${failedSteps || '  - no failed step metadata available'}`;
              })
              .join('\n');

            const prInfo = (run.pull_requests || []).map((pr) => `#${pr.number}`).join(', ') || 'none';
            const body = [
              `Workflow: ${run.name}`,
              `Run URL: ${run.html_url}`,
              `Event: ${run.event}`,
              `Branch: ${run.head_branch}`,
              `Commit: ${run.head_sha}`,
              `Associated PRs: ${prInfo}`,
              '',
              'Failed jobs:',
              failedJobs || '- no failed jobs found via API',
            ].join('\n');

            fs.writeFileSync('codex-context.md', body);

            const branchSuffix = `${run.head_branch}-${run.run_number}`
              .toLowerCase()
              .replace(/[^a-z0-9._-]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .slice(0, 48);

            core.setOutput('branch_suffix', branchSuffix || `run-${run.run_number}`);
            core.setOutput('base_branch', run.head_branch);

      # Set CODEX_AUTOFIX_ENABLED=false as a repo variable to pause this automation.
      - name: Run Codex autofix
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt: |
            The GitHub Actions workflow "CI" failed for this repository.

            Read codex-context.md for the failing run context, then inspect the repository.

            Goals:
            - diagnose the most likely root cause
            - apply the minimum safe patch to address it
            - avoid broad refactors
            - do not disable checks or weaken security to make CI pass

            Review priorities:
            1. security and secret handling
            2. logic and correctness
            3. Rust quality, error handling and clippy issues
            4. broken CI, workflow and container behavior

            Requirements:
            - keep changes small and reviewable
            - if you touch contracts or dependencies, explain why
            - if practical, run a small validation command after editing

            Your final message must be markdown with exactly these sections:
            ## Cause detected
            ## Proposed correction
            ## Files touched
            ## Risk of change
            ## Validation pending

      - name: Detect changed files
        id: diff
        shell: bash
        run: |
          git diff --name-only > codex-files.txt
          if [[ -s codex-files.txt ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create autofix pull request
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: codex/auto-fix/${{ steps.context.outputs.branch_suffix }}
          base: ${{ steps.context.outputs.base_branch }}
          commit-message: "fix(ci): codex auto-fix for ${{ github.event.workflow_run.head_branch }}"
          title: "[codex] Auto-fix CI failure on ${{ github.event.workflow_run.head_branch }}"
          body: |
            This PR was generated automatically after `CI` failed.

            Source workflow run: ${{ github.event.workflow_run.html_url }}

            ${{ steps.codex.outputs.final_message }}

            To disable this workflow temporarily, set the repository variable `CODEX_AUTOFIX_ENABLED` to `false` or disable `.github/workflows/codex-autofix.yml`.
